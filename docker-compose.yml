services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      - CORS_ALLOW_ORIGINS=http://localhost:5173
      - FAULT_MODEL_PATH=/app/backend/models/best.pt
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      - VITE_API_BASE_URL=
    ports:
      - "5173:80"
    depends_on:
      - backend
